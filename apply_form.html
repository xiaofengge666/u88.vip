<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP 转会申请表 · 填写资料</title>
<style>
  :root {
    --bg: #f5efe3;
    --bg-soft: #ede5d1;
    --bg-card: #ffffff;
    --primary: #1f5e3d;
    --primary-deep: #154a2e;
    --primary-light: #3a8c5c;
    --accent: #f0b800;
    --accent-deep: #d49d06;
    --danger: #e63946;
    --text: #1a2620;
    --text-soft: #4a5a52;
    --text-mute: #8a9690;
    --border: rgba(31,94,61,0.18);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "PingFang SC", "Microsoft YaHei", system-ui, -apple-system, Arial, sans-serif;
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(31,94,61,0.06) 0%, transparent 70%),
      linear-gradient(180deg, var(--bg) 0%, var(--bg-soft) 100%);
    background-attachment: fixed;
    min-height: 100vh;
    color: var(--text);
    padding: 30px 20px;
    line-height: 1.6;
  }
  .back-link {
    color: var(--primary);
    text-decoration: none;
    font-size: 14px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 20px;
    font-weight: 600;
    transition: opacity 0.2s;
  }
  .back-link:hover { opacity: 0.7; }

  .form-card {
    max-width: 560px;
    margin: 0 auto;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-top: 4px solid var(--primary);
    border-radius: 24px;
    padding: 40px;
    box-shadow: 0 14px 40px rgba(31,94,61,0.12);
  }
  .badge {
    display: inline-block;
    background: var(--primary);
    color: #fff;
    padding: 5px 16px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 3px;
    margin-bottom: 16px;
  }
  h1 {
    font-size: 28px;
    font-weight: 900;
    color: var(--primary-deep);
    margin-bottom: 8px;
  }
  .subtitle { color: var(--text-soft); font-size: 14px; margin-bottom: 30px; }
  .subtitle strong { color: var(--primary-deep); }

  .field { margin-bottom: 20px; }
  .field > label {
    display: block;
    color: var(--text);
    font-size: 13px;
    margin-bottom: 10px;
    font-weight: 700;
  }
  .field > label .req { color: var(--danger); margin-left: 4px; }

  /* Tier options */
  .tier-options {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }
  .tier-options input { display: none; }
  .tier-options label {
    text-align: center;
    padding: 16px 6px;
    border-radius: 12px;
    background: #fafaf6;
    border: 2px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 0;
    color: var(--text);
  }
  .tier-options label .tier-emoji {
    font-size: 28px;
    display: block;
    margin-bottom: 4px;
  }
  .tier-options label .tier-name {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
  }
  .tier-options label .tier-min {
    font-size: 10px;
    color: var(--text-mute);
    margin-top: 2px;
  }
  .tier-options label:hover { border-color: var(--primary-light); transform: translateY(-2px); background: #fff; }
  .tier-options input:checked + label {
    border-color: var(--primary);
    background: linear-gradient(160deg, #eef7f1 0%, #ddeee2 100%);
    box-shadow: 0 4px 14px rgba(31,94,61,0.15);
  }
  .tier-options input:checked + label .tier-name { color: var(--primary-deep); }

  .input-wrap {
    background: #fafaf6;
    border: 2px solid var(--border);
    border-radius: 12px;
    display: flex;
    align-items: center;
    transition: all 0.2s;
    overflow: hidden;
  }
  .input-wrap:focus-within {
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(31,94,61,0.1);
    background: #fff;
  }
  .input-prefix {
    padding: 0 14px;
    color: #fff;
    font-weight: 700;
    font-size: 15px;
    background: var(--primary);
    align-self: stretch;
    display: flex;
    align-items: center;
    user-select: none;
  }
  .field input[type="text"],
  .field input[type="tel"] {
    flex: 1;
    background: transparent;
    border: none;
    padding: 16px 14px;
    color: var(--text);
    font-size: 16px;
    outline: none;
  }
  .field input::placeholder { color: var(--text-mute); }

  .helper { font-size: 12px; color: var(--text-mute); margin-top: 6px; }
  .error-msg {
    color: var(--danger);
    font-size: 12px;
    margin-top: 6px;
    display: none;
  }
  .error-msg.show { display: block; }

  .submit-btn {
    width: 100%;
    padding: 20px;
    background: linear-gradient(90deg, var(--accent-deep), var(--accent));
    color: #fff;
    border: none;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 900;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 8px 22px rgba(240,184,0,0.4);
    margin-top: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .submit-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 12px 28px rgba(240,184,0,0.55);
  }
  .submit-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }
  .spinner {
    display: none;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg);} }
  .submit-btn.loading .spinner { display: inline-block; }
  .submit-btn.loading .btn-text { opacity: 0.7; }

  .privacy {
    text-align: center;
    color: var(--text-mute);
    font-size: 12px;
    margin-top: 18px;
  }
  .privacy a { color: var(--primary); text-decoration: none; }

  .form-error-banner {
    display: none;
    background: #fce8ea;
    border: 1px solid var(--danger);
    color: var(--danger);
    padding: 12px 16px;
    border-radius: 10px;
    margin-bottom: 16px;
    font-size: 13px;
  }
  .form-error-banner.show { display: block; }

  @media (max-width: 600px) {
    .form-card { padding: 28px 22px; }
    .tier-options { grid-template-columns: repeat(2, 1fr); }
    h1 { font-size: 22px; }
  }
</style>
</head>
<body>

<div style="max-width: 560px; margin: 0 auto;">
  <a href="index.html" class="back-link">← 返回首页</a>
</div>

<div class="form-card">
  <span class="badge">VIP 转会申请</span>
  <h1>填写申请资料</h1>
  <p class="subtitle">请填写以下信息,我们的客户经理将在 <strong>24 小时内</strong> 与您联系并协助开通您的 VIP 身价。</p>

  <div class="form-error-banner" id="errorBanner">提交失败,请检查网络后重试。</div>

  <form id="applyForm" autocomplete="off">

    <div class="field">
      <label>选择您的身价等级 <span class="req">*</span></label>
      <div class="tier-options">
        <input type="radio" name="tier" id="t1" value="青铜">
        <label for="t1"><span class="tier-emoji"><img src="member-bronze.png" style="width:80px; height:54px; object-fit:contain;"></span><span class="tier-name">青铜</span><span class="tier-min">50K+</span></label>

        <input type="radio" name="tier" id="t2" value="白银">
        <label for="t2"><span class="tier-emoji"><img src="member-silver.png" style="width:80px; height:54px; object-fit:contain;"></span><span class="tier-name">白银</span><span class="tier-min">300K+</span></label>

        <input type="radio" name="tier" id="t3" value="黄金">
        <label for="t3"><span class="tier-emoji"><img src="member-gold.png" style="width:80px; height:54px; object-fit:contain;"></span><span class="tier-name">黄金</span><span class="tier-min">2M+</span></label>

        <input type="radio" name="tier" id="t4" value="铂金">
        <label for="t4"><span class="tier-emoji"><img src="member-platinum.png" style="width:80px; height:54px; object-fit:contain;"></span><span class="tier-name">铂金</span><span class="tier-min">10M+</span></label>

        <input type="radio" name="tier" id="t5" value="钻石">
        <label for="t5"><span class="tier-emoji"><img src="member-diamond.png" style="width:80px; height:54px; object-fit:contain;"></span><span class="tier-name">钻石</span><span class="tier-min">30M+</span></label>
      </div>
      <p class="error-msg" id="tierError">请选择您的身价等级</p>
    </div>

    <div class="field">
      <label>姓名 <span class="req">*</span></label>
      <div class="input-wrap">
        <input type="text" id="name" name="name" placeholder="请输入您的姓名" maxlength="50">
      </div>
      <p class="error-msg" id="nameError">请输入您的姓名</p>
    </div>

    <div class="field">
      <label>手机号码 <span class="req">*</span></label>
      <div class="input-wrap">
        <span class="input-prefix">+60</span>
        <input type="tel" id="phone" name="phone" placeholder="例如:123456789" maxlength="15" inputmode="numeric">
      </div>
      <p class="helper">客户经理将通过此号码与您联系（WhatsApp / 电话）</p>
      <p class="error-msg" id="phoneError">请输入有效的手机号码</p>
    </div>

    <button type="submit" class="submit-btn" id="submitBtn">
      <span class="spinner"></span>
      <span class="btn-text">✈ 提交申请</span>
    </button>

    <p class="privacy">🔒 您的资料严格保密,仅用于 VIP 身价审核与开通。</p>
  </form>
</div>

<script>
  // GOOGLE SHEETS WEBHOOK URL - replace with your deployed Apps Script URL
  // See sheets_setup_guide.md for setup instructions
  const SHEET_WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbzmTgpFOQFkIG2WdZ5SfSUHiI89CSlyFqpETAKJuCMNeQ4KGxSFCQ4BIuhVM_Y1wbh4Og/exec";

  const form = document.getElementById('applyForm');
  const btn  = document.getElementById('submitBtn');
  const banner = document.getElementById('errorBanner');

  const phoneInput = document.getElementById('phone');
  phoneInput.addEventListener('input', e => {
    e.target.value = e.target.value.replace(/[^\d]/g, '');
  });

  function showError(id, show) {
    document.getElementById(id).classList.toggle('show', !!show);
  }

  function validate() {
    let ok = true;
    const tier = document.querySelector('input[name="tier"]:checked');
    const name = document.getElementById('name').value.trim();
    const phone = document.getElementById('phone').value.trim();

    showError('tierError', !tier);
    showError('nameError', !name);
    showError('phoneError', !(phone && phone.length >= 8 && phone.length <= 12));

    if (!tier || !name || phone.length < 8 || phone.length > 12) ok = false;
    return ok;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    banner.classList.remove('show');

    if (!validate()) return;

    const data = {
      tier:  document.querySelector('input[name="tier"]:checked').value,
      name:  document.getElementById('name').value.trim(),
      phone: '+60' + document.getElementById('phone').value.trim(),
      time:  new Date().toISOString(),
      source: 'VIP身价测算落地页'
    };

    btn.classList.add('loading');
    btn.disabled = true;

    try {
      if (SHEET_WEBHOOK_URL && !SHEET_WEBHOOK_URL.includes('REPLACE_WITH')) {
        await fetch(SHEET_WEBHOOK_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
      } else {
        console.log('[DEMO MODE - 请在 apply_form.html 中配置 SHEET_WEBHOOK_URL]', data);
        await new Promise(r => setTimeout(r, 800));
      }

      try { sessionStorage.setItem('vipApplyData', JSON.stringify(data)); } catch(_) {}

      window.location.href = 'thank_you.html';

    } catch (err) {
      console.error(err);
      banner.textContent = '提交失败,请检查网络后重试。或直接联系经理。';
      banner.classList.add('show');
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  });

  document.querySelectorAll('input[name="tier"]').forEach(r =>
    r.addEventListener('change', () => showError('tierError', false))
  );
  document.getElementById('name').addEventListener('input', () => showError('nameError', false));
  document.getElementById('phone').addEventListener('input', () => showError('phoneError', false));
</script>

</body>
</html>
